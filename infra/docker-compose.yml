services:
  postgres:
    image: postgres:16
    container_name: dataprismai-postgres
    environment:
      POSTGRES_USER: dataprismai
      POSTGRES_PASSWORD: dataprismai
      POSTGRES_DB: dataprismai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: dataprismai-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
